name: Bug report
description: Report a reproducible problem with the application
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets or security exploit details. Use private vulnerability reporting for security issues.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the page, search, or filter involved.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Open...
2. Search for...
3. See..."
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true