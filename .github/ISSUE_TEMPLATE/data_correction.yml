name: Scholarship correction
description: Report inaccurate or outdated scholarship information
title: "[Data]: "
labels: ["data"]
body:
  - type: input
    id: scholarship
    attributes:
      label: Scholarship name
    validations:
      required: true
  - type: input
    id: listing
    attributes:
      label: OpenScholar listing URL
  - type: input
    id: provider
    attributes:
      label: Original provider URL
      description: Link to the provider page supporting the correction.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: What should change?
      description: State the current value, corrected value, and the evidence on the provider page.
    validations:
      required: true